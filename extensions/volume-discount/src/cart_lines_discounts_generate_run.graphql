query CartInput {
  cart {
    cost {
      subtotalAmount {
        amount
        currencyCode
      }
    }
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
          currencyCode
        }
      }
      merchandise {
        ... on ProductVariant {
          id
          metafield(namespace: "pricing", key: "quantity_breaks") {
            value
          }
        }
      }
    }
  }
  discount {
    discountClasses
  }
}
